services:
  db:
    image: postgres:16-alpine
    container_name: automarket_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: automarket
      POSTGRES_USER: automarket
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U automarket"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: automarket_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://automarket:${POSTGRES_PASSWORD:-changeme123}@db:5432/automarket
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-supersecret_change_in_prod}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
